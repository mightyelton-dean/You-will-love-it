<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special Awaits... 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a853;
    --gold-light: #f0d080;
    --rose: #c0596e;
    --deep: #0a0408;
    --dark: #120810;
    --mid: #1e0f18;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--deep);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  /* ── STARS ── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── PARTICLE DUST ── */
  .dust {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .dust-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,83,0.9), transparent);
    animation: floatDust linear infinite;
  }
  @keyframes floatDust {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-100vh) translateX(var(--dx)) scale(0.3); opacity: 0; }
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  /* ── MAIN STAGE ── */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  /* Crown */
  .crown {
    font-size: clamp(3rem, 10vw, 6rem);
    opacity: 0;
    animation: crownDrop 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards;
    filter: drop-shadow(0 0 30px rgba(212,168,83,0.8));
    margin-bottom: 10px;
  }
  @keyframes crownDrop {
    from { opacity: 0; transform: translateY(-60px) scale(0.5); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Gold line */
  .gold-line {
    width: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
    animation: expandLine 1.2s ease 1.2s forwards;
  }
  @keyframes expandLine { to { width: clamp(160px, 40vw, 340px); } }

  /* Pre-title */
  .pre-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeUp 1s ease 1.6s forwards;
    margin-bottom: 16px;
  }

  /* Main name */
  .queen-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(3.5rem, 14vw, 10rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, #c8941a 0%, #f0d080 35%, #d4a853 55%, #fff8e0 70%, #c8941a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(212,168,83,0.4));
    opacity: 0;
    animation: queenReveal 1.5s ease 2s forwards;
  }
  @keyframes queenReveal {
    from { opacity: 0; transform: scale(0.8) translateY(20px); letter-spacing: 0.3em; }
    to   { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.06em; }
  }

  .gold-line-2 {
    width: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
    animation: expandLine 1.2s ease 2.8s forwards;
  }

  /* Tagline */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 3.5vw, 1.6rem);
    font-style: italic;
    font-weight: 300;
    color: rgba(255,240,210,0.85);
    letter-spacing: 0.06em;
    max-width: 540px;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 1.2s ease 3.2s forwards;
  }

  /* Message lines */
  .message-wrap {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .msg-line {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 2vw, 0.95rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(212,168,83,0.7);
    opacity: 0;
  }
  .msg-line:nth-child(1) { animation: fadeUp 0.8s ease 4s forwards; }
  .msg-line:nth-child(2) { animation: fadeUp 0.8s ease 4.3s forwards; }
  .msg-line:nth-child(3) { animation: fadeUp 0.8s ease 4.6s forwards; }

  /* CTA Button */
  .cta-wrap {
    margin-top: 50px;
    opacity: 0;
    animation: fadeUp 1s ease 5.2s forwards;
  }

  .cta-btn {
    position: relative;
    display: inline-block;
    padding: 18px 54px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.8rem, 2.2vw, 1rem);
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--deep);
    background: linear-gradient(135deg, #c8941a, #f0d080, #d4a853);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 30px rgba(212,168,83,0.4), 0 4px 20px rgba(0,0,0,0.5);
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 2.5s ease 6s infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    50%, 100% { left: 150%; }
  }

  .cta-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 50px rgba(212,168,83,0.6), 0 8px 30px rgba(0,0,0,0.6);
  }

  .cta-btn:active { transform: scale(0.98); }

  /* Corner ornaments */
  .ornament {
    position: fixed;
    font-size: clamp(1.2rem, 4vw, 2.2rem);
    color: rgba(212,168,83,0.25);
    z-index: 3;
    opacity: 0;
    animation: fadeUp 1s ease 5.5s forwards;
  }
  .ornament.tl { top: 20px; left: 24px; }
  .ornament.tr { top: 20px; right: 24px; }
  .ornament.bl { bottom: 20px; left: 24px; }
  .ornament.br { bottom: 20px; right: 24px; }

  /* Heartbeat rings */
  .rings {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,168,83,0.12);
    transform: translate(-50%, -50%);
    animation: pulse-ring linear infinite;
  }
  @keyframes pulse-ring {
    0%   { width: 100px; height: 100px; opacity: 0.5; }
    100% { width: 600px; height: 600px; opacity: 0; }
  }

  /* Page transition overlay */
  .transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--deep);
    pointer-events: none;
    opacity: 0;
  }
  .transition-overlay.active {
    pointer-events: all;
    animation: fadeToBlack 1.2s ease forwards;
  }
  @keyframes fadeToBlack {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile tweaks */
  @media (max-width: 400px) {
    .cta-btn { padding: 16px 36px; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="dust" id="dust"></div>
<div class="vignette"></div>

<div class="rings">
  <div class="ring" style="animation-duration:3s; animation-delay:5s;"></div>
  <div class="ring" style="animation-duration:3s; animation-delay:6.5s;"></div>
  <div class="ring" style="animation-duration:3s; animation-delay:8s;"></div>
</div>

<div class="stage">
  <div class="crown">👑</div>

  <div class="gold-line"></div>

  <p class="pre-title">A message from the one who adores you</p>

  <h1 class="queen-name">Goodness</h1>

  <div class="gold-line-2"></div>

  <p class="tagline">
    Before you go any further, know this — <br>
    what lies beyond this page was made<br>
    <em>entirely for you, my queen.</em>
  </p>

  <div class="message-wrap">
    <p class="msg-line">✦ &nbsp; you are seen &nbsp; ✦</p>
    <p class="msg-line">✦ &nbsp; you are cherished &nbsp; ✦</p>
    <p class="msg-line">✦ &nbsp; you are everything &nbsp; ✦</p>
  </div>

  <div class="cta-wrap">
    <a class="cta-btn" href="main.html" id="enterBtn">Enter Your World ✦</a>
  </div>
</div>

<!-- Corner ornaments -->
<div class="ornament tl">✦</div>
<div class="ornament tr">✦</div>
<div class="ornament bl">✦</div>
<div class="ornament br">✦</div>

<div class="transition-overlay" id="overlay"></div>

<script>
// ── STAR FIELD ──
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.4 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Deep space gradient bg
  const bg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width * 0.8);
  bg.addColorStop(0, '#1a0a14');
  bg.addColorStop(1, '#060208');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    s.alpha += s.twinkleSpeed * s.twinkleDir;
    if (s.alpha >= 1 || s.alpha <= 0.1) s.twinkleDir *= -1;
    s.y -= s.speed * 0.1;
    if (s.y < 0) s.y = canvas.height;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    // Gold-tinted stars
    const hue = Math.random() > 0.8 ? `rgba(212,168,83,${s.alpha})` : `rgba(255,248,230,${s.alpha})`;
    ctx.fillStyle = hue;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resizeCanvas();
initStars();
drawStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ── DUST PARTICLES ──
const dustContainer = document.getElementById('dust');
for (let i = 0; i < 35; i++) {
  const d = document.createElement('div');
  d.className = 'dust-particle';
  const size = Math.random() * 4 + 1;
  d.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random() * 100}vw;
    top: ${Math.random() * 100}vh;
    --dx: ${(Math.random() - 0.5) * 120}px;
    animation-duration: ${8 + Math.random() * 14}s;
    animation-delay: ${Math.random() * 10}s;
  `;
  dustContainer.appendChild(d);
}

// ── BUTTON TRANSITION ──
document.getElementById('enterBtn').addEventListener('click', function(e) {
  e.preventDefault();
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  setTimeout(() => { window.location.href = 'main.html'; }, 1100);
});
</script>
</body>
</html>
