<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Something Special Awaits... 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #d4a853; --gold-light: #f0d080; --rose: #c0596e; --deep: #0a0408; }
  html { font-size: 16px; }
  body { width: 100%; min-height: 100vh; height: 100%; background: var(--deep); overflow: hidden; font-family: 'Cormorant Garamond', serif; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }

  #stars-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  .dust { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .dust-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(212,168,83,0.9), transparent); animation: floatDust linear infinite; }
  @keyframes floatDust { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.6; } 100% { transform: translateY(-100vh) translateX(var(--dx)) scale(0.3); opacity: 0; } }

  .vignette { position: fixed; inset: 0; z-index: 2; background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.8) 100%); pointer-events: none; }

  .stage { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 24px; text-align: center; overflow: hidden; }

  .crown { font-size: clamp(2rem, 8vw, 5rem); line-height: 1; opacity: 0; animation: crownDrop 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards; filter: drop-shadow(0 0 24px rgba(212,168,83,0.8)); margin-bottom: clamp(6px,1.5vh,12px); flex-shrink: 0; }
  @keyframes crownDrop { from { opacity: 0; transform: translateY(-50px) scale(0.5); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .gold-line, .gold-line-2 { width: 0; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: clamp(8px,2vh,18px) auto; flex-shrink: 0; }
  .gold-line  { animation: expandLine 1.2s ease 1.2s forwards; }
  .gold-line-2 { animation: expandLine 1.2s ease 2.8s forwards; }
  @keyframes expandLine { to { width: clamp(100px, 35vw, 300px); } }

  .pre-title { font-family: 'Dancing Script', cursive; font-size: clamp(0.85rem, 3.5vw, 1.3rem); color: var(--gold); letter-spacing: 0.08em; opacity: 0; animation: fadeUp 1s ease 1.6s forwards; margin-bottom: clamp(4px,1vh,12px); padding: 0 10px; flex-shrink: 0; }

  .queen-name { font-family: 'Cinzel', serif; font-size: clamp(2.8rem, 13vw, 9rem); font-weight: 900; line-height: 1; letter-spacing: 0.04em; background: linear-gradient(135deg, #c8941a 0%, #f0d080 35%, #d4a853 55%, #fff8e0 70%, #c8941a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(212,168,83,0.4)); opacity: 0; animation: queenReveal 1.5s ease 2s forwards; flex-shrink: 0; }
  @keyframes queenReveal { from { opacity: 0; transform: scale(0.85) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .tagline { font-family: 'Cormorant Garamond', serif; font-size: clamp(0.88rem, 3.2vw, 1.45rem); font-style: italic; font-weight: 300; color: rgba(255,240,210,0.85); letter-spacing: 0.04em; max-width: min(520px, 90vw); line-height: 1.65; opacity: 0; animation: fadeUp 1.2s ease 3.2s forwards; flex-shrink: 0; padding: 0 8px; }

  .message-wrap { margin-top: clamp(12px,2.5vh,30px); display: flex; flex-direction: column; gap: clamp(2px,0.8vh,6px); align-items: center; flex-shrink: 0; }
  .msg-line { font-family: 'Cinzel', serif; font-size: clamp(0.52rem, 1.8vw, 0.88rem); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(212,168,83,0.75); opacity: 0; }
  .msg-line:nth-child(1) { animation: fadeUp 0.8s ease 4s   forwards; }
  .msg-line:nth-child(2) { animation: fadeUp 0.8s ease 4.3s forwards; }
  .msg-line:nth-child(3) { animation: fadeUp 0.8s ease 4.6s forwards; }

  .cta-wrap { margin-top: clamp(16px,3vh,46px); opacity: 0; animation: fadeUp 1s ease 5.2s forwards; flex-shrink: 0; }
  .cta-btn { position: relative; display: inline-block; padding: clamp(11px,2vh,18px) clamp(24px,6vw,52px); font-family: 'Cinzel', serif; font-size: clamp(0.65rem, 2vw, 0.95rem); font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #0a0408; background: linear-gradient(135deg, #c8941a, #f0d080, #d4a853); border: none; border-radius: 2px; cursor: pointer; text-decoration: none; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 0 28px rgba(212,168,83,0.4), 0 4px 18px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .cta-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2.5s ease 6s infinite; }
  @keyframes shimmer { 0% { left: -100%; } 50%, 100% { left: 150%; } }
  .cta-btn:hover  { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 50px rgba(212,168,83,0.6), 0 8px 28px rgba(0,0,0,0.6); }
  .cta-btn:active { transform: scale(0.97); }

  .ornament { position: fixed; font-size: clamp(0.8rem, 3vw, 1.8rem); color: rgba(212,168,83,0.22); z-index: 3; opacity: 0; animation: fadeUp 1s ease 5.5s forwards; }
  .ornament.tl { top: clamp(10px,2vw,20px); left: clamp(10px,2vw,22px); }
  .ornament.tr { top: clamp(10px,2vw,20px); right: clamp(10px,2vw,22px); }
  .ornament.bl { bottom: clamp(10px,2vw,20px); left: clamp(10px,2vw,22px); }
  .ornament.br { bottom: clamp(10px,2vw,20px); right: clamp(10px,2vw,22px); }

  .transition-overlay { position: fixed; inset: 0; z-index: 100; background: var(--deep); pointer-events: none; opacity: 0; }
  .transition-overlay.active { pointer-events: all; animation: fadeToBlack 1.2s ease forwards; }
  @keyframes fadeToBlack { 0% { opacity: 0; } 100% { opacity: 1; } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* Small phones */
  @media (max-width: 360px) {
    .tagline br { display: none; }
    .queen-name { font-size: clamp(2.4rem, 14vw, 4rem); }
  }

  /* Landscape short screens */
  @media (max-height: 560px) {
    .gold-line, .gold-line-2 { margin: 5px auto; }
    .crown      { font-size: clamp(1.5rem, 5vw, 2.8rem); margin-bottom: 3px; }
    .queen-name { font-size: clamp(1.8rem, 10vw, 5rem); }
    .tagline    { font-size: clamp(0.75rem, 2.2vw, 1rem); line-height: 1.45; }
    .msg-line   { font-size: clamp(0.45rem, 1.4vw, 0.65rem); }
    .message-wrap { margin-top: 8px; }
    .cta-wrap   { margin-top: 12px; }
  }

  /* Very short screens - hide some elements */
  @media (max-height: 420px) {
    .gold-line, .gold-line-2 { display: none; }
    .message-wrap { display: none; }
    .pre-title  { font-size: clamp(0.7rem,2vw,0.9rem); margin-bottom: 2px; }
    .tagline    { font-size: clamp(0.7rem,2vw,0.9rem); }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="dust" id="dust"></div>
<div class="vignette"></div>

<div class="stage">
  <div class="crown">👑</div>
  <div class="gold-line"></div>
  <p class="pre-title">A message from the one who adores you</p>
  <h1 class="queen-name">Goodness</h1>
  <div class="gold-line-2"></div>
  <p class="tagline">
    Before you go any further, know this —<br>
    what lies beyond this page was made<br>
    <em>entirely for you, my queen.</em>
  </p>
  <div class="message-wrap">
    <p class="msg-line">✦ &nbsp; you are seen &nbsp; ✦</p>
    <p class="msg-line">✦ &nbsp; you are cherished &nbsp; ✦</p>
    <p class="msg-line">✦ &nbsp; you are everything &nbsp; ✦</p>
  </div>
  <div class="cta-wrap">
    <a class="cta-btn" href="main.html" id="enterBtn">Enter Your World ✦</a>
  </div>
</div>

<div class="ornament tl">✦</div>
<div class="ornament tr">✦</div>
<div class="ornament bl">✦</div>
<div class="ornament br">✦</div>

<div class="transition-overlay" id="overlay"></div>

<script>
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function initStars() {
  stars = [];
  const count = Math.min(Math.floor((canvas.width * canvas.height) / 5500), 240);
  for (let i = 0; i < count; i++) {
    stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.3+0.2, alpha: Math.random(), speed: Math.random()*0.3+0.05, ts: Math.random()*0.016+0.004, td: Math.random()>0.5?1:-1 });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width*0.85);
  bg.addColorStop(0, '#1a0a14'); bg.addColorStop(1, '#060208');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.alpha += s.ts * s.td;
    if (s.alpha >= 1 || s.alpha <= 0.05) s.td *= -1;
    s.y -= s.speed * 0.07;
    if (s.y < 0) s.y = canvas.height;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = Math.random()>0.85 ? `rgba(212,168,83,${s.alpha})` : `rgba(255,248,230,${s.alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

resize(); initStars(); draw();
window.addEventListener('resize', () => { resize(); initStars(); });

const dustEl = document.getElementById('dust');
const dc = window.innerWidth < 480 ? 16 : 30;
for (let i = 0; i < dc; i++) {
  const d = document.createElement('div');
  d.className = 'dust-particle';
  const sz = Math.random()*3.5+1;
  d.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dx:${(Math.random()-0.5)*100}px;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
  dustEl.appendChild(d);
}

document.getElementById('enterBtn').addEventListener('click', function(e) {
  e.preventDefault();
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  setTimeout(() => { window.location.href = 'main.html'; }, 1100);
});
</script>
</body>
</html>
